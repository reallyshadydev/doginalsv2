# Dogecoin Core configuration example
# Copy this to your Dogecoin data directory as `dogecoin.conf`

rpcuser=your_rpc_user
rpcpassword=your_rpc_password
rpcport=22555
rpcallowip=127.0.0.1
server=1
# Enable txindex if you need transaction index; enabling it later will require a reindex
# Remove or set to 0 if you do not need it
txindex=1